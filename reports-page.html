<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports Page - MediAxis Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root,[data-theme="light"]{--bg:#f7f6f2;--surface:#f9f8f5;--surface-2:#f3f0ec;--text:#28251d;--muted:#66645f;--border:#d4d1ca;--primary:#01696f;--success:#437a22;--warning:#964219;--font-body:'Inter',sans-serif;--font-display:'Instrument Serif',serif}
    [data-theme="dark"]{--bg:#171614;--surface:#1c1b19;--surface-2:#242320;--text:#e1dfdb;--muted:#b4b1aa;--border:#393836;--primary:#4f98a3;--success:#78b652;--warning:#d08a5d}
    *{box-sizing:border-box;margin:0;padding:0} body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6}
    .container{max-width:1080px;margin:auto;padding:24px} .topbar{display:flex;justify-content:space-between;gap:12px;padding:18px 24px;border-bottom:1px solid var(--border)}
    .nav{display:flex;gap:10px;flex-wrap:wrap}.nav a,.nav button{padding:12px 16px;border:1px solid var(--border);border-radius:999px;background:var(--surface);min-height:44px;text-decoration:none;color:inherit}
    h1{font-family:var(--font-display);font-size:clamp(2rem,4vw,3.4rem);line-height:.95;margin:22px 0 8px}.muted{color:var(--muted)}
    .list{display:grid;gap:16px;margin-top:24px}.report{display:flex;justify-content:space-between;gap:20px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px}
    .badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:.76rem;font-weight:700}.ready{background:rgba(67,122,34,.12);color:var(--success)}.processing{background:rgba(150,66,25,.12);color:var(--warning)}
    .btn{display:inline-flex;padding:12px 16px;border-radius:999px;border:1px solid var(--border);background:var(--surface-2);font-weight:700;text-decoration:none;color:inherit}
    @media (max-width:760px){.report{flex-direction:column;align-items:start}}
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a href="index.html">Landing</a>
      <a href="booking-page.html">Booking</a>
      <a href="reports-page.html">Reports</a>
      <a href="admin-dashboard.html">Admin Dashboard</a>
    </nav>
    <button id="themeToggle">Theme</button>
  </header>

  <main class="container">
    <h1>Reports</h1>
    <p class="muted">Static patient reports available for view and download.</p>

    <div class="list" id="reportsList"></div>
  </main>

  <script>
    const reports = [
      {status:"Ready", test:"Lipid Profile", patient:"Rahul Verma", center:"CarePath Labs", booking:"BK-1002", file:"rahul_verma_lipid_profile.pdf", date:"22 June 2026"},
      {status:"Ready", test:"Vitamin B12", patient:"Farhan Khan", center:"MedSure Diagnostic Hub", booking:"BK-1006", file:"farhan_khan_b12_report.pdf", date:"21 June 2026"},
      {status:"Processing", test:"Thyroid Profile (T3, T4, TSH)", patient:"Sneha Iyer", center:"HealthFirst Diagnostics", booking:"BK-1001", file:"pending_upload", date:"24 June 2026"}
    ];

    document.getElementById("reportsList").innerHTML = reports.map(r => `
      <article class="report">
        <div>
          <span class="badge ${r.status === 'Ready' ? 'ready' : 'processing'}">${r.status}</span>
          <h3 style="margin-top:10px;">${r.test}</h3>
          <p class="muted">${r.patient} · ${r.center} · ${r.booking}</p>
          <p class="muted">Updated on ${r.date}</p>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <a class="btn" href="#">${r.file}</a>
          <a class="btn" href="#">${r.status === 'Ready' ? 'Download' : 'Await report'}</a>
        </div>
      </article>
    `).join("");

    const toggle = document.getElementById("themeToggle");
    let d = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', d);
    toggle.textContent = d === 'dark' ? 'Light mode' : 'Dark mode';
    toggle.onclick = () => {
      d = d === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', d);
      toggle.textContent = d === 'dark' ? 'Light mode' : 'Dark mode';
    };
  </script>
</body>
</html>
